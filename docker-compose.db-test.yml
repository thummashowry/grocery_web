services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: grocery_test
      POSTGRES_USER: grocery
      POSTGRES_PASSWORD: grocery
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grocery -d grocery_test"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5433:5432"
    volumes:
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro

  tests:
    image: node:20-alpine
    working_dir: /workspace
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://grocery:grocery@db:5432/grocery_test
    volumes:
      - ./:/workspace
    command: sh -c "npm ci && npm run test:api:db"
